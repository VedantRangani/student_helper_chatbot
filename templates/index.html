<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Helper AI</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
      --border: rgba(255,255,255,0.06); --text: #ffffff; --muted: rgba(255,255,255,0.28);
      --blue: #4da6ff; --blue-glow: rgba(77,166,255,0.35); --blue-dim: rgba(77,166,255,0.12);
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; overflow:hidden; }

    /* NAV */
    nav {
      position:fixed; top:0; left:0; right:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 32px; z-index:100;
      background:rgba(10,10,15,0.85); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; }
    .nav-logo span { color:var(--blue); }
    .nav-right { display:flex; align-items:center; gap:16px; }
    .nav-user { font-size:13px; color:var(--muted); }
    .nav-user strong { color:var(--text); }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted); padding:7px 18px; border-radius:8px; font-family:'Sora',sans-serif; font-size:12px; cursor:pointer; text-decoration:none; transition:border-color 0.2s,color 0.2s; }
    .btn-logout:hover { border-color:rgba(255,80,80,0.5); color:#ff6060; }

    /* LAYOUT */
    .page { display:flex; flex-direction:column; align-items:center; height:100vh; padding-top:72px; overflow:hidden; }

    /* VISUALIZER — sits above chat card, hidden when idle */
    .viz-section {
      width:100%; max-width:860px;
      padding:16px 32px 0;
      display:flex; flex-direction:column; align-items:center; gap:0;
    }
    #viz-canvas {
      width:100%; height:56px; display:block;
      opacity:0.35; transition:opacity 0.4s;
    }
    #viz-canvas.speaking { opacity:1; }

    /* CHAT CARD */
    .chat-card {
      background:var(--surface); border:1px solid var(--border); border-radius:20px;
      width:100%; max-width:860px;
      margin:12px 32px 20px;
      display:flex; flex-direction:column;
      flex:1; overflow:hidden; position:relative;
    }

    /* pulse ring */
    .pulse-ring { position:absolute; inset:0; border-radius:20px; border:1px solid var(--blue); opacity:0; pointer-events:none; }
    .pulse-ring.active { animation:pulse-border 2s ease-out infinite; }
    @keyframes pulse-border { 0%{opacity:0.5;transform:scale(1)} 100%{opacity:0;transform:scale(1.01)} }

    /* ── TRANSCRIPT (scrollable, capped height, no overflow) ── */
    .transcript-area {
      padding:14px 24px 12px;
      border-bottom:1px solid var(--border);
      max-height:96px;          /* fixed cap — never grows beyond this */
      overflow-y:auto;
      scrollbar-width:thin;
      scrollbar-color:var(--border) transparent;
      flex-shrink:0;
    }
    .transcript-area::-webkit-scrollbar { width:3px; }
    .transcript-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    #transcript-text {
      font-size:16px;            /* fixed size — no clamp that grows huge */
      font-weight:600;
      letter-spacing:-0.2px;
      text-align:center;
      line-height:1.55;
      word-break:break-word;
    }

    .word { color:var(--muted); transition:color 0.3s,text-shadow 0.3s; }
    .word.active { color:var(--text); text-shadow:0 0 16px rgba(255,255,255,0.35); }
    .word.spoken { color:rgba(255,255,255,0.45); }

    /* CHAT HISTORY */
    #chat-history {
      flex:1; overflow-y:auto; padding:14px 20px;
      display:flex; flex-direction:column; gap:10px;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    #chat-history::-webkit-scrollbar { width:4px; }
    #chat-history::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .msg { display:flex; gap:10px; align-items:flex-start; animation:fadeUp 0.3s ease both; }
    .msg.user { flex-direction:row-reverse; }
    .msg-bubble { max-width:70%; padding:10px 16px; border-radius:14px; font-size:14px; line-height:1.55; }
    .msg.user .msg-bubble { background:linear-gradient(135deg,var(--blue),#2979cc); color:#fff; border-bottom-right-radius:4px; }
    .msg.bot  .msg-bubble { background:var(--surface2); color:var(--text); border-bottom-left-radius:4px; border:1px solid var(--border); }
    .msg-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
    .msg.user .msg-avatar { background:var(--blue); color:#000; }
    .msg.bot  .msg-avatar { background:var(--surface2); color:var(--blue); border:1px solid var(--border); }

    /* STATUS */
    #status-bar { padding:0 20px 6px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; min-height:16px; }

    /* dot indicators */
    .dots-row { display:flex; gap:8px; justify-content:center; padding:6px 0 10px; }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); opacity:0.3; transition:all 0.3s; }
    .dot.active { background:var(--blue); opacity:1; width:20px; border-radius:4px; }

    /* ── INPUT ROW — send + mic side by side ── */
    .input-row {
      display:flex; gap:8px;
      padding:12px 16px;
      border-top:1px solid var(--border);
      align-items:center;
    }
    #msg-input {
      flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:12px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px; outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    #msg-input::placeholder { color:rgba(255,255,255,0.2); }
    #msg-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }

    /* Send button */
    .btn-send {
      background:linear-gradient(135deg,var(--blue),#2979cc); border:none; color:#fff;
      padding:12px 20px; border-radius:10px; font-family:'Sora',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer;
      box-shadow:0 2px 12px var(--blue-glow);
      transition:opacity 0.2s,transform 0.15s;
      display:flex; align-items:center; gap:6px; white-space:nowrap;
    }
    .btn-send:hover { opacity:0.88; transform:translateY(-1px); }

    /* Mic button — icon only, beside send */
    .btn-mic {
      width:44px; height:44px; flex-shrink:0;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:10px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s, border-color 0.2s, box-shadow 0.2s;
      position:relative;
    }
    .btn-mic:hover { border-color:var(--blue); background:var(--blue-dim); }
    .btn-mic.listening {
      background:rgba(204,77,77,0.15);
      border-color:#cc4d4d;
      box-shadow:0 0 0 3px rgba(204,77,77,0.2);
      animation:mic-pulse 1.5s ease infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow:0 0 0 3px rgba(204,77,77,0.2); }
      50%      { box-shadow:0 0 0 6px rgba(204,77,77,0.08); }
    }
    .btn-mic svg { width:18px; height:18px; stroke:var(--muted); transition:stroke 0.2s; }
    .btn-mic:hover svg { stroke:var(--blue); }
    .btn-mic.listening svg { stroke:#ff6060; }

    /* Stop button */
    .btn-stop {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .btn-stop:hover {
      border-color: #cc4d4d;
      background: rgba(204,77,77,0.15);
    }
    .btn-stop svg { width: 16px; height: 16px; stroke: #ff6060; }
    .btn-stop.visible { display: flex; }

    /* thinking dots */
    .thinking { display:flex; gap:5px; align-items:center; }
    .thinking span { width:7px; height:7px; border-radius:50%; background:var(--blue); opacity:0.5; animation:blink 1.2s ease infinite; }
    .thinking span:nth-child(2) { animation-delay:0.2s; }
    .thinking span:nth-child(3) { animation-delay:0.4s; }
    @keyframes blink { 0%,80%,100%{transform:scale(0.8);opacity:0.3} 40%{transform:scale(1);opacity:1} }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .viz-section { animation:fadeUp 0.5s ease both; }
    .chat-card   { animation:fadeUp 0.5s ease 0.15s both; }
  </style>
</head>
<body>

 <nav>
    <div class="nav-logo-wrap" style="position:relative;">
      <div class="nav-logo" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;cursor:pointer;user-select:none;">
        Student<span style="color:var(--blue);">AI</span>
      </div>
      <!-- hover dropdown -->
      <div style="
        position:absolute; top:calc(100% + 10px); left:0;
        background:#111118; border:1px solid rgba(255,255,255,0.06);
        border-radius:12px; padding:8px; min-width:190px;
        opacity:0; pointer-events:none; transform:translateY(-6px);
        transition:opacity 0.2s,transform 0.2s;
        box-shadow:0 8px 32px rgba(0,0,0,0.4); z-index:200;
      " id="nav-drop">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.5);">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          {{ username }}
        </div>
        <div style="height:1px;background:rgba(255,255,255,0.06);margin:6px 0;"></div>
        <a href="{{ url_for('about') }}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='#16161f';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='rgba(255,255,255,0.5)'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          About
        </a>
      </div>
    </div>

    <div class="nav-right">
      <a href="{{ url_for('logout') }}" class="btn-logout">Sign Out</a>
    </div>
  </nav>

  <style>
    .nav-logo-wrap:hover #nav-drop { opacity:1 !important; pointer-events:all !important; transform:translateY(0) !important; }
  </style>

  <div class="page">

    <!-- VISUALIZER — reacts to AI speech only -->
    <div class="viz-section">
      <canvas id="viz-canvas"></canvas>
    </div>

    <!-- CHAT CARD -->
    <div class="chat-card">
      <div class="pulse-ring" id="pulse-ring"></div>

      <!-- Scrollable transcript -->
      <div class="transcript-area" id="transcript-area">
        <div id="transcript-text">
          <span class="word">Ask</span> <span class="word">me</span> <span class="word">anything...</span>
        </div>
      </div>

      <div id="chat-history"></div>
      <div id="status-bar"></div>

      <div class="dots-row" id="dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
      </div>

      <!-- Input row: text field + Send + Mic -->
      <!-- Input row: text field + Send + Mic + Stop -->
<div class="input-row">
  <input
    id="msg-input"
    type="text"
    placeholder="Type your question here..."
    onkeydown="if(event.key==='Enter') sendMessage()"
  />
  <button class="btn-send" onclick="sendMessage()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    Send
  </button>
  <!-- Mic button -->
  <button class="btn-mic" id="mic-btn" onclick="toggleListening()" title="Voice input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10a7 7 0 0014 0"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <!-- Stop button — appears only when AI is speaking -->
  <button class="btn-stop" id="stop-btn" onclick="stopSpeaking()" title="Stop speaking">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="6" y="6" width="12" height="12" rx="2"/>
    </svg>
  </button>
</div>
    </div>

  </div>

  <script>
    // ── VISUALIZER (reacts to AI speech, not mic) ──
    const canvas = document.getElementById('viz-canvas');
    const ctx    = canvas.getContext('2d');
    let bars = [], isSpeaking = false;

    function initBars() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      const count = Math.floor(canvas.width / 14);
      bars = Array.from({ length: count }, () => ({
        h: 4, target: 4,
        phase: Math.random() * Math.PI * 2,
        speed: 0.04 + Math.random() * 0.04,
      }));
    }

    function drawBars() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      bars.forEach((b, i) => {
        const t = Date.now() * b.speed * 0.01;
        // Only animate when AI is speaking
        b.target = isSpeaking
          ? 6 + (Math.sin(t + b.phase) * 0.5 + 0.5) * 26 + (Math.sin(t * 1.7 + b.phase * 0.7) * 0.5 + 0.5) * 12
          : 4 + Math.sin(t * 0.2 + b.phase) * 1.5;
        b.h += (b.target - b.h) * 0.15;
        const a = isSpeaking ? 0.85 : 0.2;
        const g = ctx.createLinearGradient(0, H/2 - b.h, 0, H/2 + b.h);
        g.addColorStop(0,   `rgba(77,166,255,${a * 0.5})`);
        g.addColorStop(0.5, `rgba(77,166,255,${a})`);
        g.addColorStop(1,   `rgba(77,166,255,${a * 0.5})`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(i * 14 + 3, H/2 - b.h, 8, b.h * 2, 4);
        ctx.fill();
      });
      requestAnimationFrame(drawBars);
    }

    // ── SPEECH RECOGNITION ──
    let recognition = null, isListening = false, finalTranscript = '';

    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setStatus('Speech recognition not supported.'); return; }
      recognition = new SR();
      recognition.continuous = false;   // single utterance per press
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let interim = '';
        finalTranscript = '';
        for (let i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        showLiveWords((finalTranscript || interim).trim());
      };
      recognition.onend = () => {
        setListening(false);
        if (finalTranscript.trim()) {
          sendToBackend(finalTranscript.trim());
          finalTranscript = '';
        }
      };
      recognition.onerror = (e) => {
        setListening(false);
        setStatus('Mic error: ' + e.error);
      };
    }

    function setListening(state) {
      isListening = state;
      const btn = document.getElementById('mic-btn');
      const ring = document.getElementById('pulse-ring');
      btn.classList.toggle('listening', state);
      ring.classList.toggle('active', state);
      setStatus(state ? 'Listening...' : '');
    }

    function toggleListening() {
      if (!recognition) { setStatus('Speech not supported in this browser.'); return; }
      if (isListening) {
        recognition.stop();
      } else {
        setListening(true);
        try { recognition.start(); } catch(e) {}
      }
    }

    // ── WORD DISPLAY (transcript area) ──
    function showLiveWords(text) {
      const words = text.split(' ').filter(Boolean);
      document.getElementById('transcript-text').innerHTML =
        words.map((w, i) =>
          `<span class="word ${i === words.length - 1 ? 'active' : 'spoken'}">${w}</span>`
        ).join(' ');
      scrollTranscript();
    }

    function animateBotWords(text) {
      const words = text.split(' ');
      const el = document.getElementById('transcript-text');
      el.innerHTML = words.map(w => `<span class="word">${w}</span>`).join(' ');
      let i = 0;
      function next() {
        const spans = el.querySelectorAll('.word');
        if (i > 0 && spans[i-1]) { spans[i-1].classList.remove('active'); spans[i-1].classList.add('spoken'); }
        if (i < spans.length)    { spans[i].classList.add('active'); i++; setTimeout(next, 280); }
        scrollTranscript();
      }
      next();
    }

    function scrollTranscript() {
      const area = document.getElementById('transcript-area');
      area.scrollTop = area.scrollHeight;
    }

    // ── TTS (visualizer activates here) ──
    // ── TTS with stop button control ──
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);

  utter.onstart = () => {
    isSpeaking = true;
    canvas.classList.add('speaking');
    document.getElementById('stop-btn').classList.add('visible');   // ← show stop
  };
  utter.onend = () => {
    isSpeaking = false;
    canvas.classList.remove('speaking');
    document.getElementById('stop-btn').classList.remove('visible'); // ← hide stop
  };
  utter.onerror = () => {
    isSpeaking = false;
    canvas.classList.remove('speaking');
    document.getElementById('stop-btn').classList.remove('visible');
  };

  window.speechSynthesis.speak(utter);
}

// ── Stop speaking ──
function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  canvas.classList.remove('speaking');
  document.getElementById('stop-btn').classList.remove('visible');
  setStatus('');
}

    // ── CHAT UI ──
    let dotIdx = 0;
    const userInitial = "{{ username[0]|upper }}";

    function appendMessage(role, text) {
      const history = document.getElementById('chat-history');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <div class="msg-avatar">${role === 'user' ? userInitial : 'AI'}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>`;
      history.appendChild(div);
      history.scrollTop = history.scrollHeight;
      dotIdx = (dotIdx + 1) % 3;
      document.querySelectorAll('#dots .dot').forEach((d, i) => d.classList.toggle('active', i === dotIdx));
    }

    function showThinking() {
      const history = document.getElementById('chat-history');
      const div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'thinking-msg';
      div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
      history.appendChild(div);
      history.scrollTop = history.scrollHeight;
    }

    function removeThinking() {
      const t = document.getElementById('thinking-msg');
      if (t) t.remove();
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

    // ── BACKEND ──
    function sendToBackend(message) {
      appendMessage('user', message);
      showThinking();
      setStatus('Thinking...');
      fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      })
      .then(r => r.json())
      .then(data => {
        removeThinking();
        setStatus('');
        const reply = data.reply || 'Sorry, I could not understand that.';
        appendMessage('bot', reply);
        animateBotWords(reply);   // show words in transcript
        speak(reply);             // speak + trigger visualizer
      })
      .catch(() => { removeThinking(); setStatus('Error connecting to server.'); });
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      sendToBackend(msg);
    }

    // ── INIT ──
    window.addEventListener('load', () => { initBars(); drawBars(); initRecognition(); });
    window.addEventListener('resize', initBars);
  </script>
</body>
</html>

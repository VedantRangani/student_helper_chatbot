<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP – StudentAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#0d0d0f; --panel:#111114; --border:rgba(255,255,255,0.07); --input-bg:#18181c; --text:#f0f0f0; --muted:#6b6b7a; --cyan:#00c8d4; --cyan-dark:#00a8b5; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:48px 52px; width:100%; max-width:440px; text-align:center; animation:fadeUp 0.5s ease both; }
    .icon { width:56px; height:56px; background:rgba(0,200,212,0.1); border:1px solid rgba(0,200,212,0.2); border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    .icon svg { width:26px; height:26px; stroke:var(--cyan); }
    h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; margin-bottom:8px; }
    p  { color:var(--muted); font-size:14px; margin-bottom:36px; line-height:1.6; }
    .flash-msg { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:20px; text-align:left; }
    .flash-msg.error { background:rgba(220,50,50,0.1); color:#f06060; border:1px solid rgba(220,50,50,0.2); }
    /* OTP input boxes */
    .otp-row { display:flex; gap:10px; justify-content:center; margin-bottom:32px; }
    .otp-box {
      width:52px; height:60px; background:var(--input-bg);
      border:1px solid var(--border); border-radius:12px;
      font-size:24px; font-weight:700; text-align:center; color:var(--text);
      outline:none; transition:border-color 0.2s, box-shadow 0.2s;
      font-family:'DM Sans',sans-serif;
    }
    .otp-box:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,200,212,0.15); }
    /* hidden real input */
    #otp-hidden { display:none; }
    .btn-primary { width:100%; padding:15px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--cyan),var(--cyan-dark)); color:#000; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 4px 20px rgba(0,200,212,0.3); transition:opacity 0.2s,transform 0.15s; }
    .btn-primary:hover { opacity:0.92; transform:translateY(-1px); }
    .timer { font-size:12px; color:var(--muted); margin-top:20px; }
    .timer span { color:var(--cyan); font-weight:600; }
    .resend-link { color:var(--cyan); font-size:13px; cursor:pointer; text-decoration:underline; display:none; margin-top:16px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
    </div>
    <h1>Verify your identity</h1>
    <p>We sent a 6-digit OTP to your registered email and phone number. It expires in 10 minutes.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-msg {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify_signup_otp') if action == 'signup' else url_for('verify_reset_otp') }}" id="otp-form">
      <!-- Visual OTP boxes -->
      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b0"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b1"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b2"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b3"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b4"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" id="b5"/>
      </div>
      <!-- Hidden input that Flask reads -->
      <input type="hidden" name="otp" id="otp-hidden"/>
      <button type="submit" class="btn-primary" onclick="collectOtp()">Verify OTP</button>
    </form>

    <div class="timer">Code expires in <span id="countdown">10:00</span></div>
    <div class="resend-link" id="resend-link" onclick="window.history.back()">Resend OTP</div>
  </div>

  <script>
    // Auto-advance between boxes
    const boxes = document.querySelectorAll('.otp-box');
    boxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '');
        if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
      });
    });
    boxes[0].focus();

    function collectOtp() {
      const otp = Array.from(boxes).map(b => b.value).join('');
      document.getElementById('otp-hidden').value = otp;
    }

    // Countdown timer
    let seconds = 600;
    const el = document.getElementById('countdown');
    const resend = document.getElementById('resend-link');
    const timer = setInterval(() => {
      seconds--;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      el.textContent = `${m}:${s}`;
      if (seconds <= 0) {
        clearInterval(timer);
        el.textContent = 'Expired';
        el.style.color = '#f06060';
        resend.style.display = 'block';
      }
    }, 1000);
  </script>
</body>
</html>

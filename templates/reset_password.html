<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – StudentAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#0d0d0f; --panel:#111114; --border:rgba(255,255,255,0.07); --input-bg:#18181c; --text:#f0f0f0; --muted:#6b6b7a; --cyan:#00c8d4; --cyan-dark:#00a8b5; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:48px 52px; width:100%; max-width:440px; animation:fadeUp 0.5s ease both; }
    .card h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; margin-bottom:8px; }
    .card p  { color:var(--muted); font-size:14px; margin-bottom:32px; }
    .flash-msg { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; }
    .flash-msg.error { background:rgba(220,50,50,0.1); color:#f06060; border:1px solid rgba(220,50,50,0.2); }
    .field { margin-bottom:18px; }
    .field label { display:block; font-size:11px; font-weight:500; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .field input { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:10px; padding:14px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .field input::placeholder { color:#3a3a46; }
    .field input:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,200,212,0.1); }
    .btn-primary { width:100%; padding:15px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--cyan),var(--cyan-dark)); color:#000; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 4px 20px rgba(0,200,212,0.3); transition:opacity 0.2s,transform 0.15s; margin-top:8px; }
    .btn-primary:hover { opacity:0.92; transform:translateY(-1px); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set new password</h1>
    <p>Choose a strong password for your account.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-msg {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('reset_password') }}">
      <div class="field"><label>New Password</label><input type="password" name="password" placeholder="Create a new password" required/></div>
      <div class="field"><label>Confirm Password</label><input type="password" name="confirm_password" placeholder="Repeat new password" required/></div>
      <button type="submit" class="btn-primary">Reset Password</button>
    </form>
  </div>
</body>
</html>
